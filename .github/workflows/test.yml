name: Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: main

jobs:
  quality:
    runs-on: ubuntu-latest
    name: Quality Checks
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm test
      - name: Run typecheck
        run: pnpm typecheck
      - name: Run lint
        run: pnpm lint
      - name: Build action bundle
        run: pnpm build

  preview_single_file:
    runs-on: ubuntu-latest
    name: Preview Single File
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build action bundle
        run: pnpm build
      - name: Prepare generated single-file site
        run: |
          mkdir -p .tmp/generated-single
          cp test/fixtures/basic-single-file/index.html .tmp/generated-single/index.html
      - name: Upload generated single-file preview
        id: single_file_preview
        uses: ./
        with:
          html_file: index.html
          site_root: .tmp/generated-single
          artifact_name: generated-single-preview
      - name: Assert single-file preview outputs
        run: |
          test "${{ steps.single_file_preview.outputs.mode }}" = "artifact"
          test "${{ steps.single_file_preview.outputs.upload_strategy }}" = "raw"
          test "${{ steps.single_file_preview.outputs.artifact_count }}" = "1"
          test "${{ steps.single_file_preview.outputs.discovered_files_count }}" = "1"
          test -n "${{ steps.single_file_preview.outputs.artifact_url }}"

  preview_multi_file_default:
    runs-on: ubuntu-latest
    name: Preview Multi File Default
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build action bundle
        run: pnpm build
      - name: Prepare generated multi-file site
        run: |
          mkdir -p .tmp/generated-site
          cp -R test/fixtures/linked-pages/. .tmp/generated-site/
      - name: Upload generated multi-file preview
        id: generated_site_preview
        uses: ./
        with:
          html_file: index.html
          site_root: .tmp/generated-site
          artifact_name: generated-site-preview
      - name: Assert multi-file preview outputs
        run: |
          test "${{ steps.generated_site_preview.outputs.mode }}" = "artifact"
          test "${{ steps.generated_site_preview.outputs.upload_strategy }}" = "archive"
          test "${{ steps.generated_site_preview.outputs.artifact_count }}" = "1"
          test "${{ steps.generated_site_preview.outputs.discovered_files_count }}" = "6"
          test -n "${{ steps.generated_site_preview.outputs.artifact_url }}"
          test -n "${{ steps.generated_site_preview.outputs.artifact_manifest }}"

  preview_multi_file_archive:
    runs-on: ubuntu-latest
    name: Preview Multi File Archive
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build action bundle
        run: pnpm build
      - name: Prepare generated multi-file site
        run: |
          mkdir -p .tmp/generated-site
          cp -R test/fixtures/linked-pages/. .tmp/generated-site/
      - name: Upload generated multi-file preview as archive
        id: generated_site_archive_preview
        uses: ./
        with:
          html_file: index.html
          site_root: .tmp/generated-site
          artifact_format: archive
          artifact_name: generated-site-archive-preview
      - name: Assert multi-file archive preview outputs
        run: |
          test "${{ steps.generated_site_archive_preview.outputs.mode }}" = "artifact"
          test "${{ steps.generated_site_archive_preview.outputs.upload_strategy }}" = "archive"
          test "${{ steps.generated_site_archive_preview.outputs.artifact_count }}" = "1"
          test "${{ steps.generated_site_archive_preview.outputs.discovered_files_count }}" = "6"
          test -n "${{ steps.generated_site_archive_preview.outputs.artifact_url }}"

  preview_repo_mode:
    runs-on: ubuntu-latest
    name: Preview Repo Mode
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10
          cache: true
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build action bundle
        run: pnpm build
      - name: Validate repo mode still works
        id: repo_preview
        uses: ./
        with:
          mode: repo
          html_file: index.html
          site_root: test/fixtures/basic-single-file
      - name: Assert repo mode outputs
        run: |
          test "${{ steps.repo_preview.outputs.mode }}" = "repo"
          test "${{ steps.repo_preview.outputs.upload_strategy }}" = "repo"
          test "${{ steps.repo_preview.outputs.discovered_files_count }}" = "1"
          test -n "${{ steps.repo_preview.outputs.url }}"
